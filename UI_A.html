<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>업그레이드 UI · A (센터 팝업)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css">
<style>
:root{
  color-scheme: light;
  --color-background-primary:#ffffff;
  --color-background-secondary:#f0efe8;
  --color-background-tertiary:#f7f6f1;
  --color-background-info:#e6f1fb;
  --color-text-primary:#1f1e1c;
  --color-text-secondary:#73726c;
  --color-text-tertiary:#9c9a92;
  --color-text-info:#185fa5;
  --color-border-tertiary:rgba(0,0,0,0.12);
  --color-border-secondary:rgba(0,0,0,0.22);
  --color-border-info:#378add;
  --border-radius-md:8px;
  --border-radius-lg:12px;
  --border-radius-xl:16px;
}
@media (prefers-color-scheme: dark){
  :root{
    color-scheme: dark;
    --color-background-primary:#1f1e1c;
    --color-background-secondary:#2a2926;
    --color-background-tertiary:#161513;
    --color-background-info:#0c447c;
    --color-text-primary:#ecebe4;
    --color-text-secondary:#a8a69d;
    --color-text-tertiary:#7c7a72;
    --color-text-info:#85b7eb;
    --color-border-tertiary:rgba(255,255,255,0.14);
    --color-border-secondary:rgba(255,255,255,0.26);
    --color-border-info:#378add;
  }
}
*{box-sizing:border-box;}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--color-background-tertiary);color:var(--color-text-primary);font-family:system-ui,-apple-system,"Segoe UI",Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;}
.ti{font-size:inherit;line-height:1;}

#ap2 .navi{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:10px 0;cursor:pointer;background:transparent;border:none;transition:background .12s}
#ap2 .navi:hover{background:var(--color-background-secondary)}
#ap2 .navi i{font-size:24px;color:var(--color-text-secondary);transition:transform .18s,color .18s}
#ap2 .navi .lab{font-size:11px;margin-top:4px;color:var(--color-text-tertiary);transition:color .18s}
#ap2 .navi.tmp i{color:var(--color-text-tertiary)}
#ap2 .navi.on i{color:var(--color-text-info);transform:scale(1.35)}
#ap2 .navi.on .lab{color:var(--color-text-info);font-weight:500}
@media (prefers-reduced-motion: no-preference){
  #ap2 .navi.on i{animation:ap2iconpop .4s ease-out}
}
@keyframes ap2iconpop{0%{transform:scale(1)}55%{transform:scale(1.55)}100%{transform:scale(1.35)}}
#ap2 .pop{animation:ap2pop .16s ease-out}
@keyframes ap2pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
#ap2 .xbtn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;background:#e24b4a;color:#fff;border:none;border-radius:var(--border-radius-md);cursor:pointer}
#ap2 .xbtn:hover{background:#c93f3e}
#ap2 .cost{display:flex;align-items:center;gap:6px;background:var(--color-background-secondary);border:none;border-radius:var(--border-radius-md);padding:11px 15px;font-size:14px;font-weight:500;cursor:pointer;color:var(--color-text-primary);align-self:center;}
#ap2 .cost:hover{background:var(--color-background-info);color:var(--color-text-info);}
#ap2 #apc{scrollbar-width:none;-ms-overflow-style:none;}
#ap2 #apc::-webkit-scrollbar{width:0;height:0;display:none;}
</style>
</head>
<body>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">하단 아이콘을 누르면 화면 중앙에 업그레이드 캔버스가 팝업된다. 각 능력치 행은 이름, 현재 레벨, 현재값 → 다음값 구조로 표시된다.</h2>

<div id="ap2" style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem;">
  <div style="position:relative;width:400px;max-width:100%;margin:0 auto;height:680px;background:var(--color-background-tertiary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);overflow:hidden;">

    <div style="position:absolute;top:12px;right:12px;display:flex;align-items:center;gap:6px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:999px;padding:6px 13px;font-size:13px;color:var(--color-text-secondary);z-index:1;"><i class="ti ti-coins" style="font-size:15px;" aria-hidden="true"></i>12,480</div>

    <div style="position:absolute;left:0;right:0;top:0;bottom:66px;display:flex;align-items:center;justify-content:center;">
      <div style="text-align:center;font-size:13px;color:var(--color-text-tertiary);">게임화면 · 아래 아이콘을 누르세요</div>
    </div>

    <div id="abd" style="position:absolute;left:0;right:0;top:0;bottom:66px;background:rgba(0,0,0,0.45);display:none;z-index:2;"></div>

    <div id="apop" class="pop" style="position:absolute;top:84px;bottom:90px;left:22px;right:22px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);display:none;flex-direction:column;z-index:3;overflow:hidden;">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 14px 14px 16px;border-bottom:0.5px solid var(--color-border-tertiary);">
        <div style="display:flex;align-items:center;gap:9px;"><i id="api" class="ti ti-users" style="font-size:20px;color:var(--color-text-info);" aria-hidden="true"></i><span id="apt" style="font-size:16px;font-weight:500;">일꾼 업그레이드</span></div>
        <button id="axbtn" class="xbtn" aria-label="닫기"><i class="ti ti-x" style="font-size:19px;" aria-hidden="true"></i></button>
      </div>
      <div id="apc" style="padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;"></div>
    </div>

    <div style="position:absolute;left:0;right:0;bottom:0;display:flex;background:var(--color-background-primary);border-top:0.5px solid var(--color-border-tertiary);z-index:4;">
      <button class="navi" data-cat="worker"><i class="ti ti-users" aria-hidden="true"></i><div class="lab">일꾼</div></button>
      <button class="navi" data-cat="equip"><i class="ti ti-sword" aria-hidden="true"></i><div class="lab">장비</div></button>
      <button class="navi" data-cat="player"><i class="ti ti-user-up" aria-hidden="true"></i><div class="lab">플레이어</div></button>
      <button class="navi tmp"><i class="ti ti-lock" aria-hidden="true"></i><div class="lab">미정</div></button>
      <button class="navi tmp"><i class="ti ti-lock" aria-hidden="true"></i><div class="lab">미정</div></button>
    </div>

    <div id="atoast" style="position:absolute;left:50%;bottom:78px;transform:translateX(-50%);background:var(--color-text-primary);color:var(--color-background-primary);font-size:13px;padding:8px 15px;border-radius:999px;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap;z-index:5;">준비 중인 슬롯입니다</div>

  </div>
</div>

<script>
(function(){
  var META={
    worker:{name:'일꾼 업그레이드',icon:'ti-users'},
    equip:{name:'장비 업그레이드',icon:'ti-sword'},
    player:{name:'플레이어 업그레이드',icon:'ti-user-up'}
  };
  var DATA={
    player:[
      {n:"Player's Speed",lv:'Lv.10',cur:'이동 속도 1.44',next:'1.45',icon:'ti-run',gold:69},
      {n:'Digging Power',lv:'Lv.10',cur:'채굴력 24',next:'25',icon:'ti-pick',gold:40},
      {n:'Backpack Capacity',lv:'Lv.1',cur:'가방 용량 10',next:'11',icon:'ti-backpack',gold:25},
      {n:'Hands Capacity',lv:'Lv.1',cur:'손 용량 5',next:'6',icon:'ti-hand-stop',gold:200},
      {n:'Digging Speed',lv:'Lv.1',cur:'채굴 속도 1.3',next:'1.32',icon:'ti-bolt',gold:300},
      {n:'Pickup Radius',lv:'Lv.1',cur:'획득 반경 1.1',next:'1.11',icon:'ti-magnet',gold:300}
    ],
    worker:[
      {n:'Cashier : Checkout Speed',lv:'Lv.5',cur:'정산 쿨타임 3.2초',next:'3.0초',icon:'ti-cash-register',gold:500},
      {n:'Load Worker : Carry Capacity',lv:'Lv.5',cur:'운반량 6',next:'7',icon:'ti-box',gold:500},
      {n:'Load Worker : Move Speed',lv:'Lv.5',cur:'이동 속도 2.6',next:'2.8',icon:'ti-run',gold:500},
      {n:'Craft Worker : Craft Time Rate',lv:'Lv.5',cur:'제작 시간 단축 20%',next:'25%',icon:'ti-hammer',gold:500},
      {n:'Repairer : Repair Speed',lv:'Lv.5',cur:'수리 속도 6초',next:'5.5초',icon:'ti-tool',gold:500},
      {n:'Display Worker : Carry Capacity',lv:'Lv.5',cur:'진열 운반량 6',next:'7',icon:'ti-building-store',gold:500},
      {n:'Display Worker : Move Speed',lv:'Lv.5',cur:'진열 이동 속도 2.6',next:'2.8',icon:'ti-run',gold:500}
    ],
    equip:[
      {n:'검 무기 강화',lv:'Lv.2',cur:'판매가 22',next:'28',icon:'ti-sword',gold:410},
      {n:'도끼 무기 강화',lv:'Lv.1',cur:'판매가 16',next:'22',icon:'ti-axe',gold:650},
      {n:'망치 무기 강화',lv:'Lv.1',cur:'판매가 16',next:'22',icon:'ti-hammer',gold:900}
    ]
  };

  var apc=document.getElementById('apc');
  var apop=document.getElementById('apop');
  var abd=document.getElementById('abd');
  var toast=document.getElementById('atoast');

  function render(cur){
    var items=DATA[cur],html='';
    items.forEach(function(it){
      html+='<div style="display:flex;align-items:center;gap:12px;padding:12px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);">'+
        '<div style="width:46px;height:46px;flex-shrink:0;border-radius:var(--border-radius-md);background:var(--color-background-info);display:flex;align-items:center;justify-content:center;color:var(--color-text-info);"><i class="ti '+it.icon+'" style="font-size:24px;"></i></div>'+
        '<div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:3px;">'+
          '<div style="font-size:14px;font-weight:500;line-height:1.3;">'+it.n+'</div>'+
          '<div style="font-size:12px;color:var(--color-text-tertiary);">'+it.lv+'</div>'+
          '<div style="font-size:13px;line-height:1.3;"><span style="color:var(--color-text-secondary);">'+it.cur+'</span> <span style="color:var(--color-text-tertiary);">→</span> <span style="color:var(--color-text-info);font-weight:500;">'+it.next+'</span></div>'+
        '</div>'+
        '<button class="cost"><i class="ti ti-coins" style="font-size:15px;color:var(--color-text-secondary);"></i>'+it.gold.toLocaleString()+'</button>'+
      '</div>';
    });
    apc.innerHTML=html;
  }
  function open(k){
    var m=META[k];
    document.getElementById('apt').textContent=m.name;
    document.getElementById('api').className='ti '+m.icon;
    abd.style.display='block';
    apop.style.display='flex';
    apop.classList.remove('pop');void apop.offsetWidth;apop.classList.add('pop');
    document.querySelectorAll('#ap2 .navi[data-cat]').forEach(function(b){b.classList.toggle('on',b.dataset.cat===k);});
    var icon=document.querySelector('#ap2 .navi[data-cat="'+k+'"] i');
    if(icon){icon.style.animation='none';void icon.offsetWidth;icon.style.animation='';}
    render(k);
  }
  function close(){
    abd.style.display='none';
    apop.style.display='none';
    document.querySelectorAll('#ap2 .navi[data-cat]').forEach(function(b){b.classList.remove('on');});
  }
  var tt;
  function temp(){
    toast.style.opacity='1';clearTimeout(tt);
    tt=setTimeout(function(){toast.style.opacity='0';},1300);
  }

  document.querySelectorAll('#ap2 .navi[data-cat]').forEach(function(b){
    b.addEventListener('click',function(){open(b.dataset.cat);});
  });
  document.querySelectorAll('#ap2 .navi.tmp').forEach(function(b){
    b.addEventListener('click',temp);
  });
  document.getElementById('axbtn').addEventListener('click',close);
  abd.addEventListener('click',close);
})();
</script>
</body>
</html>
