<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Mine Progress Bar — Preview v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111118;
  font-family: 'Segoe UI', system-ui, sans-serif;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 16px 60px;
  gap: 40px;
}

.section-label {
  font-size: 10px; letter-spacing: 2px; color: #444;
  text-transform: uppercase; margin-bottom: 10px;
}

/* ════════════════════════
   HUD CARD
════════════════════════ */
.hud-wrap { width: 100%; max-width: 480px; }

.hud-card {
  background: linear-gradient(160deg, #1a1a28, #10101a);
  border: 1px solid #252535;
  border-radius: 14px;
  padding: 24px 28px 24px 24px;
  position: relative;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.04);
  overflow: visible;
}
.hud-card::before {
  content: '';
  position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(180,140,60,0.25), transparent);
}

/* ── bar row ── */
.bar-row {
  display: flex;
  align-items: center;
  gap: 0;
}

.bar-outer {
  flex: 1;
  height: 32px;
  background: #0c0c18;
  border-radius: 8px;
  border: 1px solid #1e1e32;
  position: relative;
  overflow: visible;
}

/* single fixed fill color */
.bar-fill {
  height: 100%;
  border-radius: 8px 0 0 8px;
  background: linear-gradient(90deg, #1e5a9a 0%, #3a8ed0 70%, #5cb8f0 100%);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 0 8px rgba(58,142,208,0.25);
  position: relative;
  overflow: hidden;
  transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  min-width: 0;
}
/* fill rounds right edge at 100% */
.bar-fill.full { border-radius: 8px; }

/* shimmer */
.bar-fill::after {
  content: '';
  position: absolute; top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.16), transparent);
  animation: shimmer 2.6s infinite;
}
@keyframes shimmer { to { left: 160%; } }

/* ── % centered in bar-outer ── */
.bar-pct {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  font-size: 13px;
  font-weight: 800;
  color: rgba(255,255,255,0.95);
  text-shadow: 0 1px 6px rgba(0,0,0,0.8);
  letter-spacing: 0.4px;
  pointer-events: none;
  z-index: 4;
  white-space: nowrap;
}

/* ── 80% marker ── */
.marker-80 {
  position: absolute;
  left: 80%;
  top: -12px; bottom: -12px;
  width: 0;
  transform: translateX(-50%);
  z-index: 6;
}
.marker-line {
  position: absolute;
  top: 0; bottom: 0;
  left: 0;
  width: 2px; margin-left: -1px;
  background: #3a3a5a;
  border-radius: 1px;
  transition: background 0.35s, box-shadow 0.35s;
}
.marker-pip {
  position: absolute;
  top: -2px; left: 50%;
  transform: translateX(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3a3a5a;
  border: 1.5px solid #2a2a44;
  transition: all 0.35s;
}
.marker-label {
  position: absolute;
  bottom: -20px; left: 50%;
  transform: translateX(-50%);
  font-size: 9px; font-weight: 700;
  color: #3a3a5a; letter-spacing: 0.5px;
  white-space: nowrap;
  transition: color 0.35s;
}

.marker-80.lit .marker-line {
  background: #f0aa30;
  box-shadow: 0 0 7px 2px rgba(240,170,48,0.65);
}
.marker-80.lit .marker-pip {
  background: #f0c050;
  border-color: #f8d870;
  box-shadow: 0 0 10px rgba(240,170,48,0.9);
}
.marker-80.lit .marker-label { color: #f0aa30; }

/* ════════════════════════
   TREASURE CHEST
════════════════════════ */
.chest-wrap {
  width: 44px; height: 44px;
  margin-left: 10px;
  flex-shrink: 0;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}

/* CSS chest */
.chest {
  position: relative;
  width: 36px; height: 28px;
}
/* body */
.chest-body {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 16px;
  background: linear-gradient(180deg, #6b3a10 0%, #4a2508 100%);
  border: 1.5px solid #3a1a04;
  border-radius: 0 0 4px 4px;
  transition: all 0.4s;
}
.chest-body::after {
  content: '';
  position: absolute;
  bottom: 3px; left: 50%; transform: translateX(-50%);
  width: 8px; height: 6px;
  background: #c8860a;
  border-radius: 50%;
  border: 1px solid #a06008;
}
/* lid */
.chest-lid {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 14px;
  background: linear-gradient(180deg, #8a4e18 0%, #5c2e08 100%);
  border: 1.5px solid #3a1a04;
  border-radius: 4px 4px 0 0;
  transform-origin: bottom center;
  transition: transform 0.5s cubic-bezier(0.34,1.56,0.64,1), background 0.3s;
}
.chest-lid::after {
  content: '';
  position: absolute;
  bottom: -1px; left: -1px; right: -1px;
  height: 3px;
  background: #c8860a;
  border-radius: 1px;
}

/* lock band */
.chest-band {
  position: absolute;
  top: 12px; left: 0; right: 0;
  height: 3px;
  background: #c8860a;
  z-index: 1;
}

/* open state */
.chest.open .chest-lid {
  transform: rotateX(-130deg);
  background: linear-gradient(180deg, #b06020 0%, #7a3e10 100%);
}

/* glow when open */
.chest-glow {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,210,60,0.5) 0%, transparent 70%);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s;
  animation: chest-glow-pulse 1.2s ease-in-out infinite;
}
@keyframes chest-glow-pulse {
  0%,100% { transform: scale(1); opacity: 0.6; }
  50%      { transform: scale(1.15); opacity: 1; }
}
.chest.open ~ .chest-glow,
.chest-wrap.open .chest-glow { opacity: 1; }

/* ════════════════════════
   WORLD BEACON PANEL
   (separate from HUD)
════════════════════════ */
.world-wrap { width: 100%; max-width: 480px; }

.world-card {
  background: #0e0e1c;
  border: 1px solid #1e1e30;
  border-radius: 12px;
  padding: 16px 18px;
  display: flex;
  gap: 16px;
  align-items: center;
  position: relative;
  overflow: hidden;
  transition: border-color 0.4s;
}
.world-card.active {
  border-color: rgba(240,170,48,0.35);
  background: linear-gradient(135deg, #141008 0%, #0e0e1c 60%);
}
.world-card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 20% 50%, rgba(240,170,48,0.06) 0%, transparent 60%);
  opacity: 0; transition: opacity 0.5s;
}
.world-card.active::before { opacity: 1; }

/* mini map area */
.mini-map {
  width: 72px; height: 56px;
  background: #090914;
  border: 1px solid #1a1a2e;
  border-radius: 8px;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
/* map terrain lines */
.mini-map::before {
  content: '';
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(0deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 11px),
    repeating-linear-gradient(90deg, transparent, transparent 10px, rgba(255,255,255,0.02) 10px, rgba(255,255,255,0.02) 11px);
}
/* terrain blobs */
.mini-map::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 30px 20px at 20px 30px, rgba(40,80,30,0.4) 0%, transparent 80%),
    radial-gradient(ellipse 20px 16px at 55px 20px, rgba(40,80,30,0.3) 0%, transparent 80%);
}

/* beacon dot on map */
.beacon-dot {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #3a3a5a;
  border: 1.5px solid #2a2a44;
  top: 28px; left: 42px;
  z-index: 2;
  transition: all 0.4s;
}
.beacon-dot::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1.5px solid rgba(240,170,48,0);
  transition: all 0.4s;
}
.beacon-dot.lit {
  background: #f0aa30;
  border-color: #f8d070;
  box-shadow: 0 0 8px rgba(240,170,48,0.9);
}
.beacon-dot.lit::before {
  border-color: rgba(240,170,48,0.5);
  animation: beacon-ring 1.8s ease-out infinite;
}
@keyframes beacon-ring {
  0%   { transform: scale(1); opacity: 0.8; }
  100% { transform: scale(2.8); opacity: 0; }
}

/* world text */
.world-text { flex: 1; }
.world-status {
  font-size: 12px; font-weight: 700;
  color: #444; margin-bottom: 4px;
  transition: color 0.4s;
  letter-spacing: 0.3px;
}
.world-card.active .world-status { color: #f0aa30; }
.world-desc {
  font-size: 11px; color: #333; line-height: 1.5;
  transition: color 0.4s;
}
.world-card.active .world-desc { color: #806028; }

.world-badge {
  font-size: 10px; font-weight: 700;
  padding: 3px 8px; border-radius: 10px;
  background: #1a1a2a; border: 1px solid #2a2a3a;
  color: #444; letter-spacing: 0.5px;
  flex-shrink: 0;
  transition: all 0.4s;
}
.world-card.active .world-badge {
  background: rgba(240,170,48,0.1);
  border-color: rgba(240,170,48,0.4);
  color: #f0aa30;
}

/* ════════════════════════
   PRIORITY TABLE
════════════════════════ */
.priority-table {
  width: 100%; border-collapse: collapse; font-size: 11px;
}
.priority-table th {
  text-align: left; padding: 6px 12px;
  color: #363648; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;
  border-bottom: 1px solid #1a1a28;
}
.priority-table td {
  padding: 9px 12px; vertical-align: middle;
  border-bottom: 1px solid #141420;
}
.priority-table tr:last-child td { border-bottom: none; }
.pri-num  { color: #444; font-weight: 800; font-size: 12px; width: 20px; }
.pri-info { color: #999; font-weight: 600; }
.pri-how  { color: #555; font-size: 10.5px; }
.priority-table tr.hi td { background: rgba(240,170,48,0.04); }
.priority-table tr.hi .pri-num  { color: #f0aa30; }
.priority-table tr.hi .pri-info { color: #f0c050; }
.priority-table tr.hi .pri-how  { color: #906828; }

/* ════════════════════════
   CONFETTI CANVAS
════════════════════════ */
#confetti-canvas {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 200;
}

/* ════════════════════════
   SIMULATOR
════════════════════════ */
.sim-wrap { width: 100%; max-width: 480px; }
.sim-title { font-size: 10px; letter-spacing: 2px; color: #333; text-transform: uppercase; margin-bottom: 12px; }
.slider-row { display: flex; align-items: center; gap: 12px; }
.slider-row label { font-size: 11px; color: #444; width: 36px; }
input[type=range] {
  flex: 1; -webkit-appearance: none;
  height: 4px; border-radius: 2px; background: #222232; outline: none; cursor: pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: #4a9edd; cursor: pointer;
}
.slider-val { font-size: 13px; font-weight: 800; min-width: 38px; text-align: right; color: #666; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- ═══ HUD ═══ -->
<div class="hud-wrap">
  <div class="section-label">HUD Preview</div>
  <div class="hud-card">
    <div class="bar-row">

      <div class="bar-outer" id="bar-outer">
        <div class="bar-fill" id="bar-fill" style="width:82%"></div>

        <!-- % always centered in bar-outer -->
        <span class="bar-pct" id="bar-pct">82%</span>

        <!-- 80% marker -->
        <div class="marker-80 lit" id="marker-80">
          <div class="marker-pip"></div>
          <div class="marker-line"></div>
          <div class="marker-label"></div>
        </div>
      </div>

      <!-- treasure chest -->
      <div class="chest-wrap" id="chest-wrap">
        <div class="chest" id="chest">
          <div class="chest-lid"></div>
          <div class="chest-band"></div>
          <div class="chest-body"></div>
        </div>
        <div class="chest-glow" id="chest-glow" style="opacity:0"></div>
      </div>

    </div>
  </div>
</div>

<!-- ═══ World Beacon (별도 패널) ═══ -->
<div class="world-wrap">
  <div class="section-label">World — Beacon</div>
  <div class="world-card" id="world-card">
    <div class="mini-map">
      <div class="beacon-dot" id="beacon-dot"></div>
    </div>
    <div class="world-text">
      <div class="world-status" id="world-status">Beacon 미활성</div>
      <div class="world-desc" id="world-desc">80% 도달 시 월드 맵에 beacon 생성<br>및 다음 구역 개방 조건 충족</div>
    </div>
    <div class="world-badge" id="world-badge">LOCKED</div>
  </div>
</div>

<!-- ═══ Priority Table ═══ -->
<div style="width:100%;max-width:480px;">
  <div class="section-label">우선순위 정보</div>
  <table class="priority-table">
    <thead><tr><th>#</th><th>정보</th><th>표시 방식</th></tr></thead>
    <tbody>
      <tr id="row-1"><td class="pri-num">1</td><td class="pri-info">현재 구역 진행률</td><td class="pri-how">bar 내부 % · 중앙 고정</td></tr>
      <tr id="row-2"><td class="pri-num">2</td><td class="pri-info">다음 구역 개방 시점</td><td class="pri-how">80% marker</td></tr>
      <tr id="row-3"><td class="pri-num">3</td><td class="pri-info">80% 도달</td><td class="pri-how">NextRoom Beacon 생성 · 카메라 포커스 이벤트</td></tr>
      <tr id="row-4"><td class="pri-num">4</td><td class="pri-info">100% 달성 보상 지급</td><td class="pri-how">방식 미정</td></tr>
    </tbody>
  </table>
</div>

<!-- ═══ Simulator ═══ -->
<div class="sim-wrap">
  <div class="sim-title">Simulator</div>
  <div class="slider-row">
    <label>진행률</label>
    <input type="range" id="slider" min="0" max="100" value="82" oninput="update(+this.value)">
    <span class="slider-val" id="slider-val">82%</span>
  </div>
</div>

<script>
/* ── Confetti ── */
const canvas = document.getElementById('confetti-canvas');
const ctx    = canvas.getContext('2d');
let pieces   = [];
let raf      = null;

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function launchConfetti() {
  pieces = [];
  const colors = ['#f0aa30','#f8d870','#5cb8f0','#50d890','#f070b0','#ffffff','#ff8844'];
  const chest  = document.getElementById('chest-wrap').getBoundingClientRect();
  const ox = chest.left + chest.width / 2;
  const oy = chest.top  + chest.height / 2;

  for (let i = 0; i < 90; i++) {
    const angle = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 1.4;
    const speed = 3 + Math.random() * 6;
    pieces.push({
      x: ox, y: oy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      w: 5 + Math.random() * 6,
      h: 3 + Math.random() * 4,
      r: Math.random() * Math.PI * 2,
      rv: (Math.random() - 0.5) * 0.25,
      color: colors[Math.floor(Math.random() * colors.length)],
      life: 1.0,
      decay: 0.012 + Math.random() * 0.014,
    });
  }
  if (raf) cancelAnimationFrame(raf);
  animateConfetti();
}

function animateConfetti() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  pieces.forEach(p => {
    p.x  += p.vx;
    p.y  += p.vy;
    p.vy += 0.18;
    p.vx *= 0.99;
    p.r  += p.rv;
    p.life -= p.decay;
    if (p.life <= 0) return;
    ctx.save();
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.translate(p.x, p.y);
    ctx.rotate(p.r);
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
  });
  pieces = pieces.filter(p => p.life > 0);
  if (pieces.length > 0) raf = requestAnimationFrame(animateConfetti);
  else ctx.clearRect(0, 0, canvas.width, canvas.height);
}

/* ── Main update ── */
let wasComplete = false;

function update(pct) {
  document.getElementById('slider-val').textContent = pct + '%';

  // fill
  const fill = document.getElementById('bar-fill');
  fill.style.width = pct + '%';
  fill.classList.toggle('full', pct >= 100);

  // % centered
  document.getElementById('bar-pct').textContent = pct + '%';

  // 80% marker
  document.getElementById('marker-80').classList.toggle('lit', pct >= 80);

  // world beacon
  const worldCard = document.getElementById('world-card');
  const beaconDot = document.getElementById('beacon-dot');
  const lit80 = pct >= 80;
  worldCard.classList.toggle('active', lit80);
  beaconDot.classList.toggle('lit', lit80);
  document.getElementById('world-status').textContent = lit80 ? 'Beacon 활성 — 다음 구역 개방됨' : 'Beacon 미활성';
  document.getElementById('world-desc').textContent   = lit80
    ? '월드 맵 beacon 점등 · 광원 오브젝트 생성됨'
    : '80% 도달 시 월드 맵에 beacon 생성\n및 다음 구역 개방 조건 충족';
  document.getElementById('world-badge').textContent  = lit80 ? 'ACTIVE' : 'LOCKED';

  // treasure chest
  const chest = document.getElementById('chest');
  const glow  = document.getElementById('chest-glow');
  const isComplete = pct >= 100;
  chest.classList.toggle('open', isComplete);
  glow.style.opacity = isComplete ? '1' : '0';

  // confetti on first complete
  if (isComplete && !wasComplete) launchConfetti();
  wasComplete = isComplete;

  // table highlight
  ['row-1','row-2','row-3','row-4'].forEach(id => document.getElementById(id).classList.remove('hi'));
  if      (pct >= 100) document.getElementById('row-4').classList.add('hi');
  else if (pct >=  80) document.getElementById('row-3').classList.add('hi');
  else if (pct >    0) document.getElementById('row-1').classList.add('hi');
}

update(82);
</script>
</body>
</html>
